<!DOCTYPE html>
<html>
<head>
    <title>ACompany | By Abdurahmon</title>
    <style>
        body {
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            text-align: center; /* This helps center our inline-block cards */
            font-family: sans-serif;
        }
        .navbar {
            background-color: #333;
            color: white;
            padding: 20px;
            margin-bottom: 30px;
        }
        /* Your favorite property! */
        .card {
            display: inline-block;
            width: 280px;
            background-color: white;
            margin: 15px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            vertical-align: top; /* Keeps the tops aligned */
            text-align: left;    /* Keeps text inside cards looking neat */
        }
        .card-title {
            color: #007bff;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>ACompany</h1>
        <p>A Company by Abdurahmon</p>
    </div>

    <div class="card">
        <p class="card-title">Project One</p>
        <p>This is where I describe what ACompany is building first.</p>
    </div>

    <div class="card">
        <p class="card-title">Our Vision</p>
        <p>Simple, clean, and effective solutions for the web.</p>
    </div>

</body>
</html>
